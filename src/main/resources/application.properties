spring.application.name=Vols Xavi

# Database — override via env vars on VPS
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/flightdashboard}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Thymeleaf
spring.thymeleaf.cache=false

# Jackson — parse LocalDateTime from ISO strings
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# File upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Images storage
app.images.base-path=${IMAGES_BASE_PATH:/data/flight-images}

# Security
app.security.username=${APP_USERNAME:admin}
app.security.password=${APP_PASSWORD:changeme}

server.port=8080
