<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#1a3560"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#f0c060" stroke-width="1" opacity="0.45"/>

  <!-- Cardinal ticks -->
  <line x1="16" y1="5.5"  x2="16" y2="7.5"  stroke="#f0c060" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="24.5" x2="16" y2="26.5" stroke="#f0c060" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="5.5"  y1="16" x2="7.5"  y2="16" stroke="#f0c060" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="24.5" y1="16" x2="26.5" y2="16" stroke="#f0c060" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Intercardinal ticks -->
  <line x1="9.2"  y1="9.2"  x2="10.4" y2="10.4" stroke="#f0c060" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  <line x1="21.6" y1="21.6" x2="22.8" y2="22.8" stroke="#f0c060" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  <line x1="22.8" y1="9.2"  x2="21.6" y2="10.4" stroke="#f0c060" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  <line x1="9.2"  y1="22.8" x2="10.4" y2="21.6" stroke="#f0c060" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>

  <!-- Needle rotated 45° (NE/SW diagonal) -->
  <g transform="rotate(45 16 16)">
    <!-- North needle — gold -->
    <polygon points="16,7.5  14.3,15.8  16,14.2  17.7,15.8" fill="#f0c060"/>
    <!-- South needle — white/dim -->
    <polygon points="16,24.5 14.3,16.2  16,17.8  17.7,16.2" fill="#ffffff" opacity="0.55"/>
  </g>

  <!-- Center pivot -->
  <circle cx="16" cy="16" r="2"   fill="#1a3560"/>
  <circle cx="16" cy="16" r="1.2" fill="#f0c060"/>
</svg>
