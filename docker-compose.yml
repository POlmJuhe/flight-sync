services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       flightdashboard
      POSTGRES_USER:     flight
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flight123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight -d flightdashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL:      jdbc:postgresql://postgres:5432/flightdashboard
      DB_USER:     flight
      DB_PASSWORD: ${DB_PASSWORD:-flight123}
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-changeme}
    volumes:
      - flight_images:/data/flight-images
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  flight_images:
